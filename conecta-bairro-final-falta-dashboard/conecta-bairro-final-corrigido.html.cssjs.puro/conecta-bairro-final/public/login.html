<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Conecta-Bairro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <a href="index.html" class="navbar-brand" style="text-decoration: none;">
                    <div class="logo">CB</div>
                    <div class="brand-info">
                        <h1>Conecta-Bairro</h1>
                        <p class="tagline">Economia Local</p>
                    </div>
                </a>
                <ul class="nav-menu">
                    <li><a href="index.html">Início</a></li>
                    <li class="nav-guest"><a href="login.html">Entrar</a></li>
                    <li class="nav-guest"><a href="register.html" class="btn-nav">Cadastrar</a></li>
                    <li class="nav-user" style="display:none;"><span id="nav-username" style="color:var(--primary); font-weight:600;"></span></li>
                    <li class="nav-user" style="display:none;"><a href="dashboard.html">Minha Conta</a></li>
                    <li class="nav-user" style="display:none;"><a href="#" onclick="logout(); return false;" class="btn-nav">Sair</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="app">
        <section class="page active">
            <div class="container">
                <div style="max-width: 420px; margin: 2rem auto;">
                    <h2>Entrar</h2>
                    <p style="margin-bottom: 1.5rem; color: #666;">Acesse sua conta</p>
                    <form id="login-form">
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="login-email" required>
                        </div>
                        <div class="form-group">
                            <label>Senha *</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <div id="login-feedback" class="feedback"></div>
                        <div class="form-buttons">
                            <button type="submit" class="btn btn-primary">Entrar</button>
                            <a href="index.html" class="btn btn-secondary">Cancelar</a>
                        </div>
                        <p style="margin-top: 1rem; text-align: center; font-size: 14px;">
                            Não tem conta?
                            <a href="register.html" style="color: var(--primary); font-weight: 500;">Cadastre-se</a>
                        </p>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Conecta-Bairro. Todos os direitos reservados.</p>
            <p>Projeto de Extensão Universitária - Programação para Web</p>
        </div>
    </footer>

    <script src="auth.js"></script>
    <script>
        // Faz login de verdade e leva ao dashboard
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fb = document.getElementById('login-feedback');
            fb.className = 'feedback';

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = 'dashboard.html';
                } else {
                    fb.textContent = data.error || 'Não foi possível entrar';
                    fb.classList.add('error');
                }
            } catch (err) {
                fb.textContent = 'Erro de conexão com o servidor';
                fb.classList.add('error');
            }
        });
    </script>
</body>
</html>
